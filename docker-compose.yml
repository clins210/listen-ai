version: '3.8'

services:
  stat:
    build: ./stat
    ports:
      - "8002:8002"
    environment:
      - STAT_PORT=8002
      - SQLITE_PATH=/data/listenai.db
    volumes:
      - sqlite_data:/data

  nlp:
    build: ./nlp
    ports:
      - "8001:8001"
    environment:
      - NLP_PORT=8001

  gateway:
    build: ./gateway
    ports:
      - "8000:8000"
    depends_on:
      - stat
      - nlp
    environment:
      - STAT_URL=http://stat:8002
      - NLP_URL=http://nlp:8001

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    depends_on:
      - gateway
    environment:
      - GATEWAY_URL=http://gateway:8000

volumes:
  sqlite_data:

  